<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Signup Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="form-wrapper">
        <!-- Semantic layout card matching Figma dark background wrapper -->
        <div class="card">
            <form id="authForm" novalidate>
                
                <!-- Email Area Container Component -->
                <div class="field-container">
                    <label for="userEmail">Email</label>
                    <input 
                        type="email" 
                        id="userEmail" 
                        placeholder="Example@email.com" 
                        autocomplete="email"
                        aria-describedby="emailFeedback"
                        required
                    >
                    <p id="emailFeedback" class="msg text-danger" role="alert">
                        Make sure email is more than 3 characters and has @ and a .
                    </p>
                </div>

                <!-- Password Area Container Component -->
                <div class="field-container">
                    <label for="userPassword">Password</label>
                    <input 
                        type="password" 
                        id="userPassword" 
                        placeholder="Your Password"
                        autocomplete="new-password"
                        aria-describedby="passwordFeedback"
                        required
                    >
                    <p id="passwordFeedback" class="msg text-danger" role="alert">
                        Make sure password is more than 8 characters.
                    </p>
                </div>

                <!-- Validation State Feedback Message -->
                <p id="globalSuccess" class="msg text-success hide" role="alert">
                    All good to go
                </p>

                <button type="submit" id="formSubmit">Submit</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
